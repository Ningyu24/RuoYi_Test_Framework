[pytest]
# 测试文件命名规则（默认已支持 test_*.py，这里显式声明）
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 添加项目根目录到 Python 路径，确保 common/、config/ 等模块能被正确导入
pythonpath = .

# 命令行默认参数
addopts = -v --tb=short --html=reports/report.html --self-contained-html

# 日志级别（方便调试）
log_cli = true
log_cli_level = INFO

# 标记定义（用于分组测试）
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    p0: 核心核心功能
    p1: 重要功能
    p2: 一般功能